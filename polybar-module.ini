; polybar-module.ini
; Cole este bloco no seu config.ini e adicione `volume` na modules-left/center/right.
;
; Dependências: pactl, yad, python3, Nerd Font (Material Design Icons)

[module/volume]
type = custom/script
exec = ~/.config/polybar/scripts/volume_polybar.py --mode module
interval = 2
tail = false

; Clique esquerdo  → abre/fecha seletor de sinks
click-left = ~/.config/polybar/scripts/polybar-volume-toggle.sh &
; Clique direito   → toggle mudo
click-right = ~/.config/polybar/scripts/volume_polybar.py --mode toggle-mute
; Scroll cima      → volume +5%
scroll-up = ~/.config/polybar/scripts/volume_polybar.py --mode volume-up
; Scroll baixo     → volume -5%
scroll-down = ~/.config/polybar/scripts/volume_polybar.py --mode volume-down
